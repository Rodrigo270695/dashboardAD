# Versión SOLO HTTP (usar ANTES de certbot, la primera vez)
# Copiar a /etc/nginx/sites-available/dashboardad.grupomaclabi.com
# Luego: certbot --nginx -d dashboardad.grupomaclabi.com

server {
    listen 80;
    listen [::]:80;
    server_name dashboardad.grupomaclabi.com;

    access_log /var/log/nginx/dashboardad.access.log;
    error_log  /var/log/nginx/dashboardad.error.log;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 25M;

    location = /logo.png {
        alias /var/www/dashboardAD/public/logo.png;
        default_type image/png;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3010;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
